# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 poetry
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Check SPDX license headers
        run: |
          python -c '
          import os, sys, tomllib
          from pathlib import Path

          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          lic = pyproject.get("tool", {}).get("poetry", {}).get("license")
          if lic != "AGPL-3.0-or-later":
              print(f"pyproject.toml license is {lic}, expected AGPL-3.0-or-later", file=sys.stderr)
              sys.exit(1)

          license_text = Path("LICENSE").read_text(encoding="utf-8")
          if "GNU AFFERO GENERAL PUBLIC LICENSE" not in license_text:
              print("LICENSE file does not contain AGPL v3 text", file=sys.stderr)
              sys.exit(1)

          EXPECTED = "SPDX-License-Identifier: AGPL-3.0-or-later"
          missing = []
          for root, dirs, files in os.walk("."):
              if "venv" in root or ".git" in root or "__pycache__" in root or "site/build" in root:
                  continue
              for file in files:
                  if file.endswith(".py"):
                      filepath = Path(root) / file
                      if EXPECTED not in filepath.read_text(encoding="utf-8"):
                          missing.append(str(filepath))

          if missing:
              print(f"Python files missing SPDX header: {missing}", file=sys.stderr)
              sys.exit(1)

          print("SPDX license header assertion passed successfully.")
          '
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest via poetry
        run: |
          poetry install
          poetry build
          poetry run pytest --cov=ssss --cov-branch --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
